<div class="flex flex-col items-center justify-center" >
    <h1 class="flex items-center justify-center
               text-[#97ce4c] text-[25px] font-bold" > LOGIN-PAGE </h1>

    <form class="flex flex-col items-center justify-center h-fit w-fit
                 bg-[#a3e1e0]
                 border-solid border-[0.15rem] rounded-2xl"
          [formGroup]="loginForm"
          (ngSubmit)="onSubmit()" >
        <input class="h-12.5 w-125 m-7.5 p-2.5
                      bg-[#a3e1e0]
                      border-b-2 border-solid border-[#97ce4c]
                      text-slate-900 font-sans"
               placeholder="USERNAME..."
               formControlName="userName" >

        <input class="h-12.5 w-125 m-7.5 p-2.5
                      bg-[#a3e1e0]
                      border-b-2 border-solid border-[#97ce4c]
                      text-slate-900 font-sans"
               placeholder="PASSWORD..."
               formControlName="passWord" >

        <button class="justify-items-center h-15 w-100 mt-25 mb-7.5 my-7.5 p-2.5
                       bg-[#97ce4c] hover:bg-[#f0e14a]
                       border-solid border-[0.15rem] rounded-2xl cursor-pointer
                       text-slate-900 hover:text-neutral-100"
                type="submit" > LOGIN </button>
    </form>
</div>
