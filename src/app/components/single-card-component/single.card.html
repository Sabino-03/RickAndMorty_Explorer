<div>
    <div class="flex flex-col items-center justify-center m-5 p-5
                border-3 border-solid border-lime-500 rounded-3xl
                bg-linear-to-t from-cyan-500 to-cyan-50" >
        <div class="flex items-center justify-center" >
            <img class="h-75 w-75 rounded-full"
                 [src]="image()"
                 [alt]="image()" >
        </div>

        <div class="flex flex-col items-center justify-center m-5 p-5" >
            <h1 class="mt-3 text-slate-950 font-bold text-lg"
                id="Nome" > {{ name() }} </h1>

            <div class="flex flex-row items-center justify-center mt-1 gap-3" >
                <div [class]="'h-3 w-3 rounded-full ' + characterStatus()"
                     id="Stato" ></div>
                    
                <h1 class="text-slate-950 text-md"
                    id="Specie" > {{ species() }} </h1>
            </div>

            <h1 class="text-slate-950 text-md"
                id="Origine & Location" > {{ location() }} </h1>

            <h1 class="text-slate-950 text-md"
                id="Origine & Location" > {{ origin() }} </h1>
</div>
